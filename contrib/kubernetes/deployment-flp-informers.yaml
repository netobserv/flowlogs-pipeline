apiVersion: apps/v1
kind: Deployment
metadata:
  name: flp-informers
  labels:
    app: flp-informers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flp-informers
  template:
    metadata:
      labels:
        app: flp-informers
    spec:
      serviceAccountName: flp-informers
      containers:
      - name: flp-informers
        image: %IMAGE_TAG_BASE%:%VERSION%
        command: ["/app/flp-informers"]
        args:
        - --processor-selector=app=flowlogs-pipeline
        - --processor-port=9090
        - --resync-interval=60
        - --log-level=info
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flp-informers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flp-informers
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "services"]
  verbs: ["list", "watch", "get"]
- apiGroups: ["apps"]
  resources: ["replicasets", "deployments"]
  verbs: ["list", "watch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flp-informers
subjects:
- kind: ServiceAccount
  name: flp-informers
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flp-informers
---
